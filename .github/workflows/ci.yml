name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --select E,F,I --ignore E501,E402,E711,E712,F401,F841
      - run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov openai psutil aiosqlite httpx pydantic pydantic-settings typer rich
          pip install -e .
      - name: Run tests
        run: pytest tests/ -v --cov=agentic --cov-report=xml --cov-report=term-missing
        env:
          AGENTIC_OPENAI_API_KEY: sk-test-placeholder
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
